{% extends "base.html" %}
{% block content %}
<h2>{{ action_title }}</h2>
<form action="{{ action_url }}" method="POST" class="card p-4 shadow-sm">
    <h5 class="mb-3 text-muted">Base Material Fields</h5>
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ material.title if material else '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Time (minutes)</label>
            <input type="number" name="estimated_time" class="form-control" value="{{ material.estimated_time if material else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Release Date</label>
            <input type="date" name="release_date" class="form-control" value="{{ material.release_date if material else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Module</label>
            <select name="module_id" class="form-select" required>
                {% for mod in modules %}
                <option value="{{ mod.id }}" {{ 'selected' if material and material.module_id == mod.id }}>{{ mod.title }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_mandatory" class="form-check-input" id="isMandatory" value="true" {{ 'checked' if material and material.is_mandatory }}>
        <label class="form-check-label" for="isMandatory">Mandatory</label>
    </div>
    <hr>
    <h5 class="mb-3 text-muted">Test Fields</h5>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Score</label>
            <input type="number" name="score" class="form-control" value="{{ material.score if material else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Passing Score</label>
            <input type="number" name="passing_score" class="form-control" value="{{ material.passing_score if material else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Attempts Limit</label>
            <input type="number" name="attempts_limit" class="form-control" value="{{ material.attempts_limit if material else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Time Limit (min)</label>
            <input type="number" name="time_limit" class="form-control" value="{{ material.time_limit if material else '' }}" required>
        </div>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_passed" class="form-check-input" id="isPassed" value="true" {{ 'checked' if material and material.is_passed }}>
        <label class="form-check-label" for="isPassed">Passed</label>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">Save</button>
        <a href="/material/test" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
