{% extends "base.html" %}
{% block content %}
<h2>{{ action_title }}</h2>
<form action="{{ action_url }}" method="POST" class="card p-4 shadow-sm">
    <div class="mb-3">
        <label class="form-label">Course Title</label>
        <input type="text" name="title" class="form-control" value="{{ course.title if course else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ course.description if course else '' }}</textarea>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Difficulty</label>
            <select name="difficulty" class="form-select">
                <option value="Easy" {{ 'selected' if course and course.difficulty == 'Easy' }}>Easy</option>
                <option value="Medium" {{ 'selected' if course and course.difficulty == 'Medium' }}>Medium</option>
                <option value="Hard" {{ 'selected' if course and course.difficulty == 'Hard' }}>Hard</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Language</label>
            <input type="text" name="language" class="form-control" value="{{ course.language if course else 'Ukrainian' }}">
        </div>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="/courses" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
