{% extends "base.html" %}
{% block content %}
<h2>Course List</h2>
<a href="/courses/add" class="btn btn-primary mb-3">Add New Course</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Language</th>
            <th>Difficulty</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.title }}</td>
            <td>{{ course.language }}</td>
            <td>{{ course.difficulty }}</td>
            <td>
                <a href="/courses/edit/{{ course.id }}" class="btn btn-sm btn-warning">Edit</a>
                <form action="/courses/delete/{{ course.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this course?')">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
