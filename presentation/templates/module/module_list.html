{% extends "base.html" %}
{% block content %}
<h2>Module List</h2>
<a href="/module/add" class="btn btn-primary mb-3">Add New Module</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Order</th>
            <th>Locked</th>
            <th>Course ID</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for module in modules %}
        <tr>
            <td>{{ module.title }}</td>
            <td>{{ module.order_index }}</td>
            <td>{{ 'Yes' if module.is_locked else 'No' }}</td>
            <td>{{ module.course_id }}</td>
            <td>
                <a href="/module/edit/{{ module.id }}" class="btn btn-sm btn-warning">Edit</a>
                <form action="/module/delete/{{ module.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
