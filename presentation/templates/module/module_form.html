{% extends "base.html" %}
{% block content %}
<h2>{{ action_title }}</h2>
<form action="{{ action_url }}" method="POST" class="card p-4 shadow-sm">
    <div class="mb-3">
        <label class="form-label">Module Title</label>
        <input type="text" name="title" class="form-control" value="{{ module.title if module else '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Order Index</label>
            <input type="number" name="order_index" class="form-control" value="{{ module.order_index if module else 1 }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Course</label>
            <select name="course_id" class="form-select" required>
                {% for course in courses %}
                <option value="{{ course.id }}" {{ 'selected' if module and module.course_id == course.id }}>
                    {{ course.title }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" name="is_locked" class="form-check-input" id="isLocked" value="true" {{ 'checked' if module and module.is_locked }}>
        <label class="form-check-label" for="isLocked">Locked</label>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">Save</button>
        <a href="/module" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
